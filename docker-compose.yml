services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PROTOCOL_INTERNAL:PLAINTEXT,PROTOCOL_EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PROTOCOL_INTERNAL://0.0.0.0:29092,PROTOCOL_EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PROTOCOL_INTERNAL://kafka:29092,PROTOCOL_EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PROTOCOL_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8081:8080"
    depends_on:
      - kafka
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
      KAFKA_CLUSTERS_0_NAME: local-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    depends_on:
      - nginx-proxy
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  nginx-proxy:
    image: alpine/socat
    ports:
      - "8082:8082"
    command: tcp-listen:8082,fork,reuseaddr tcp:host.docker.internal:8080

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-storage:/var/lib/grafana 

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672" 
      - "15672:15672" 
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
  
  camunda:
    image: camunda/camunda-bpm-platform:run-latest
    container_name: basket-camunda
    ports:
      - "8085:8080" 

volumes:
  grafana-storage: